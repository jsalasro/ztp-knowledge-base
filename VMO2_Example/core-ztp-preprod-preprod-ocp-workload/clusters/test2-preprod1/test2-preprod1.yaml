                - IP_ADDRESS_3
                - IP_ADDRESS_45
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: IP_ADDRESS_95
                next-hop-interface: bond0.140
              - destination: IP_ADDRESS_96/28
                next-hop-address: IP_ADDRESS_97
                next-hop-interface: bond0.142
