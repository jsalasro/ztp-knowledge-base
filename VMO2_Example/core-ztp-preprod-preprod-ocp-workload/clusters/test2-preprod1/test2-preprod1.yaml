  sshPublicKey: "SSH_PUBLIC_KEY_1"
  clusterName: "test2-preprod1"
  networkType: "OVNKubernetes"
  clusterNetwork:
    - cidr: IP_ADDRESS_39/16
      hostPrefix: 23
  machineNetwork:
    - cidr: IP_ADDRESS_89/28
  apiVIPs:
    - IP_ADDRESS_90
  ingressVIPs:
    - IP_ADDRESS_91
  serviceNetwork:
    - cidr: IP_ADDRESS_41/16
  additionalNTPSources:
    - DOMAIN_EXAMPLE_32.COM
    - DOMAIN_EXAMPLE_33.COM
  extraLabels:
    ManagedCluster:
      ocp: "true"
      #config-version: "v418-20251117"
