  nodes:
    - hostName: "DOMAIN_EXAMPLE_39.COM"
      role: "master"
      bmcAddress: "redfish-virtualmedia://IP_ADDRESS_92/redfish/v1/Systems/1"
      bmcCredentialsName:
        name: "bmc-secret"
      bootMACAddress: "d4:f5:ef:b0:ed:e0"
      bootMode: "UEFI"
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management
      rootDeviceHints:
        hctl: "2:1:0:0"
      nodeNetwork:
        interfaces:
          - name: "ens4f0"
            macAddress: "d4:f5:ef:b0:ed:e0"
          - name: "ens6f1"
            macAddress: "d4:f5:ef:b0:e5:a5"
        config:
          interfaces:
            - description: "Bond 0"
              name: bond0
              type: bond
              state: up
              mtu: 8950
              link-aggregation:
                mode: '802.3ad'
                options:
                  miimon: "100"
                  lacp_rate: "0"
                port:
                  - ens4f0
                  - ens6f1
            - name: bond0.140
              type: vlan
              state: up
              vlan:
                base-iface: bond0
                id: 140
              ipv4:
                enabled: true
                dhcp: false
                address:
                  - ip: IP_ADDRESS_93
                    prefix-length: 28
              mtu: 8950
            - name: bond0.142
