---
apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: logging-loki
  namespace: openshift-logging
  annotations:
    ran.openshift.io/ztp-deploy-wave: "20"
spec:
  managementState: Managed
  size: 1x.small
  storage:
    schemas:
    - version: v13
      effectiveDate: "2024-10-01"
    secret:
      name: logging-loki
      type: s3
     #
     # We had th efollowing tls params in the loki 5.9 config
     # However, Loki 6.2 docs don't show these params
     # Bring these back if Loki stack shows cert errors
     #
    #tls:
    #  caName: openshift-service-ca.crt
    #  caKey: service-ca.crt
  storageClassName: '{{hub fromConfigMap "ztp-policy" "site-data" (printf "default-storageClass") hub}}'
  tenants:
    mode: openshift-logging
...
