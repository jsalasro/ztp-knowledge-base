---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    ran.openshift.io/ztp-deploy-wave: "20"
  name: '{{hub fromConfigMap "ztp-policy" "site-data" (printf "default-storageClass") hub}}'
provisioner: pxd.portworx.com
parameters:
  pure_fa_pod_name:  '{{hub fromConfigMap "ztp-policy" "site-data" (printf "%s-portword-pure_fa_pod_name" .ManagedClusterName) hub}}'
  backend: pure_block
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
...
