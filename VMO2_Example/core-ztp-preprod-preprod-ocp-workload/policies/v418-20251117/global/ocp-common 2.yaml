---
apiVersion: ran.openshift.io/v1
kind: PolicyGenTemplate
metadata:
  name: "ocp-common-v418-20251117"
  namespace: "ztp-policy"
spec:
  bindingRules:
    # These policies will correspond to all clusters with this label:
    ocp: "true"
    config-version: "v418-20251117"
  sourceFiles:
    ########################################################
    # Disconnected environment (wave 1)
    ########################################################
    # Create catalog source for private registry
    - fileName: DISCONNECTED/catalog-source.yaml
      policyName: "disconnected"
    # Disable default operator catalogs
    - fileName: DISCONNECTED/operator-hub.yaml
      policyName: "disconnected"
    - fileName: DISCONNECTED/itms.yaml
      policyName: "disconnected"
    # Disable insights operator
    - fileName: DISCONNECTED/disable-insights.yaml
      policyName: "disconnected"
    ########################################################
    # Install Certs (wave 1)
    ########################################################
    # CA certs
    - fileName: CERT-MANAGER/CertsCABundle.yaml
      policyName: "custom-certificates"
    - fileName: CERT-MANAGER/CertsProxy.yaml
      policyName: "custom-certificates"
    ########################################################
    # Node Configuration (wave 1)
    ########################################################
    # Make master nodes scheduleable
    - fileName: EXTRA/MastersSchedulable.yaml
      policyName: "nodes-configuration"
    # MULTIPATHCONFIG
    - fileName: EXTRA/MCMultipathMaster.yaml
      policyName: nodes-configuration
    - fileName: EXTRA/MCMultipathWorker.yaml
      policyName: nodes-configuration
    ########################################################
    # Setup authentication & AD integration (wave 10)
    ########################################################
    - fileName: AUTH/AuthRBAC.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthSecret.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthLDAPcert.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthGroupSyncRBAC.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthGroupSyncConfigMap.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthGroupSyncJob.yaml
      policyName: "authentication"
    - fileName: AUTH/AuthOauth.yaml
      policyName: "authentication"
    ########################################################
    # Operator installation & configuration (wave 10-20)
    ########################################################
    # Node Health Check Operator and Self Node Remediation
    # - fileName: AVAILABILITY/Namespace.yaml
    #   policyName: "operators-installation"
    # - fileName: AVAILABILITY/OperatorGroup.yaml
    #   policyName: "operators-installation"
    # - fileName: AVAILABILITY/NodeHealthCheckOperatorSubscription.yaml
    #   policyName: "operators-installation"
    # - fileName: AVAILABILITY/SelfNodeRemediationSubscription.yaml
    #   policyName: "operators-installation"
    # - fileName: AVAILABILITY/InstallPlan.yaml
    #   policyName: "operators-installation"
    # - fileName: AVAILABILITY/SNRTemplate.yaml
    #   policyName: "operators-instance-1"
    # - fileName: AVAILABILITY/SelfNodeConfig.yaml
    #   policyName: "operators-instance-1"
    # - fileName: AVAILABILITY/NHC-controlPlane.yaml
    #   policyName: "operators-instance-1"
    # - fileName: AVAILABILITY/NHC-worker.yaml
    #   policyName: "operators-instance-1"
    # RHOSO
    # - fileName: RHOSO/operator/RhosoNS.yaml
    #   policyName: "operators-installation"
    # - fileName: RHOSO/operator/RhosoOperGroup.yaml
    #   policyName: "operators-installation"
    # - fileName: RHOSO/operator/RhosoSubscription.yaml
    #   policyName: "operators-installation"
    # - fileName: RHOSO/operator/RhosoInstallPlan.yaml # falta crear en source-crs
    #   policyName: "operators-installation"
    # - fileName: RHOSO/operator/RhosoInit.yaml
    #   policyName: "operators-instance-1"
    # Cert-Manager
    - fileName: CERT-MANAGER/CertManagerNS.yaml
      policyName: "operators-installation"
    - fileName: CERT-MANAGER/CertManagerOperGroup.yaml
      policyName: "operators-installation"
    - fileName: CERT-MANAGER/CertManagerSubscription.yaml
      policyName: "operators-installation"
    - fileName: CERT-MANAGER/CertManagerInstallPlan.yaml
      policyName: "operators-installation"
    - fileName: CERT-MANAGER/CertManagerCASecret.yaml
      policyName: "operators-instance-1"
    - fileName: CERT-MANAGER/CertManagerClusterIssuer.yaml
      policyName: "operators-instance-1"
    - fileName: CERT-MANAGER/CertManagerIngressCertificate.yaml
      policyName: "operators-instance-1"
    - fileName: CERT-MANAGER/CertManagerApiCertificate.yaml
      policyName: "operators-instance-1"
    - fileName: CERT-MANAGER/CertManagerApiserver.yaml
      policyName: "operators-instance-1"
    - fileName: CERT-MANAGER/CertManagerIngressController.yaml
      policyName: "operators-instance-1"
    # Service Mesh
    - fileName: OSSM/OSSMNS.yaml
      policyName: operators-installation
    - fileName: OSSM/OSSMOperatorGroup.yaml
      policyName: operators-installation
    - fileName: OSSM/OSSMSubscription.yaml
      policyName: operators-installation
    - fileName: OSSM/OSSMInstallPlan.yaml
      policyName: operators-installation
    # NUMA
    - fileName: NUMA/NumaResourceNS.yaml
      policyName: operators-installation
    - fileName: NUMA/NumaResourceOperatorGroup.yaml
      policyName: operators-installation
    - fileName: NUMA/NumaResourceSubscription.yaml
      policyName: operators-installation
    - fileName: NUMA/NumaResourceInstallPlan.yaml
      policyName: operators-installation
    # MetalLB
    - fileName: METALLB/MetalLBNS.yaml
      policyName: operators-installation
    - fileName: METALLB/MetalLBOperatorGroup.yaml
      policyName: operators-installation
    - fileName: METALLB/MetalLBSubscription.yaml
      policyName: operators-installation
    - fileName: METALLB/MetalLBInstallPlan.yaml
      policyName: operators-installation
    - fileName: METALLB/MetalLBInstance.yaml
      policyName: operators-instance-1
    # NMState
    - fileName: NMSTATE/NMstateNS.yaml
      policyName: "operators-installation"
    - fileName: NMSTATE/NMstateOperatorGroup.yaml
      policyName: "operators-installation"
    - fileName: NMSTATE/NMstateSubscription.yaml
      policyName: "operators-installation"
    - fileName: NMSTATE/NMstateInstallPlan.yaml
      policyName: "operators-installation"
    - fileName: NMSTATE/NMstate.yaml
      policyName: "operators-instance-1"
    ########################################################
    # NMState configuration (wave 20-30)
    ########################################################
    # NMState NNCP Instance
    - fileName: NMSTATE/NMstateNNCP.yaml
      policyName: "operators-instance-2"
    ########################################################
    # Operator installation & configuration (wave 10-20)
    ########################################################
    # Cluster Observability
    # - fileName: COO/CooSubscription.yaml
    #   policyName: "operators-installation"
    # - fileName: COO/CooInstallPlan.yaml # falta crear en source-crs
    #   policyName: "operators-installation"
    # Cluster Logging
    - fileName: LOG/ClusterLogNS.yaml
      policyName: "operators-installation"
    - fileName: LOG/ClusterLogOperGroup.yaml
      policyName: "operators-installation"
    - fileName: LOG/ClusterLogSubscription.yaml
      policyName: "operators-installation"
    - fileName: LOG/ClusterLogInstallPlan.yaml
      policyName: "operators-installation"
    - fileName: LOG/kafka-secret1.yaml
      policyName: "logging-and-monitoring"
    # - fileName: LOG/kafka-secret2.yaml
    #   policyName: "logging-and-monitoring"
    - fileName: LOG/ClusterLogForwarder.yaml # Forward to Loki in RHOSO cluster
      policyName: "operators-instance-1"
    - fileName: LOG/ClusterLogServiceAccount.yaml
      policyName: "logging-and-monitoring"
    - fileName: LOG/ClusterLogCollectorRole.yaml
      policyName: "logging-and-monitoring"
    - fileName: LOG/ClusterLogServiceAccountWriterBinding.yaml
      policyName: "logging-and-monitoring"
    - fileName: LOG/ClusterLogServiceAccountInfraBinding.yaml
      policyName: "logging-and-monitoring"
    - fileName: LOG/ClusterLogServiceAccountAuditBinding.yaml
      policyName: "logging-and-monitoring"
    # Security Profile Operator
    - fileName: SECURITY-PROFILE/SecurityProfileNS.yaml
      policyName: "operators-installation"
    - fileName: SECURITY-PROFILE/SecurityProfileOperatorGroup.yaml
      policyName: "operators-installation"
    - fileName: SECURITY-PROFILE/SecurityProfileSubscription.yaml
      policyName: "operators-installation"
    - fileName: SECURITY-PROFILE/SecurityProfileInstallPlan.yaml
      policyName: "operators-installation"
    # Openshift Custom metrics autoscale - KEDA operator
    - fileName: CUSTOM-METRICS-AUTOSCALE/CustomMetricsAutoscaleNS.yaml
      policyName: "operators-installation"
    - fileName: CUSTOM-METRICS-AUTOSCALE/CustomMetricsAutoscaleOperatorGroup.yaml
      policyName: "operators-installation"
    - fileName: CUSTOM-METRICS-AUTOSCALE/CustomMetricsAutoscaleSubscription.yaml
      policyName: "operators-installation"
    - fileName: CUSTOM-METRICS-AUTOSCALE/CustomMetricsAutoscaleInstallPlan.yaml
      policyName: "operators-installation"
    # Loki for logStore
    # - fileName: LOKI/LokiNS.yaml
    #   policyName: "operators-installation"
    # - fileName: LOKI/LokiOperatorGroup.yaml
    #   policyName: "operators-installation"
    # - fileName: LOKI/LokiSubscription.yaml # https://docs.redhat.com/en/documentation/openshift_container_platform/4.10/html/logging/cluster-logging-loki#logging-loki-deploy_cluster-logging-loki
    #   policyName: "operators-installation"
    # - fileName: LOKI/LokiInstallPlan.yaml
    #   policyName: "operators-installation"
    # - fileName: LOKI/LoggingConsole.yaml
    #   policyName: "operators-instance-1"
    # - fileName: LOKI/LokiBucketClaim.yaml
    #   policyName: "operators-instance-1"
    # - fileName: LOKI/LokiS3Secret.yaml
    #   policyName: "operators-instance-1"
    # - fileName: LOKI/LokiStack.yaml
    #   policyName: "operators-instance-1"
    # Prometheus Kafka Adapter
    - fileName: MONITORING/KafkaAdapNS.yaml
      policyName: "operators-installation"
    - fileName: MONITORING/KafkaAdapDeployment.yaml
      policyName: "logging-and-monitoring"
    - fileName: MONITORING/KafkaAdapService.yaml
      policyName: "logging-and-monitoring"
