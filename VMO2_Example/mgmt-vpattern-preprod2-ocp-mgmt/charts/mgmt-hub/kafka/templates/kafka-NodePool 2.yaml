apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka-cluster
  labels:
    strimzi.io/cluster: mgmt-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        class: "{{ .Values.mgmt.portworx.default_storageclass }}"
        deleteClaim: false
        kraftMetadata: shared
