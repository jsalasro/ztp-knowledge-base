{{- range .Values.mgmt.kafka.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  labels:
    strimzi.io/cluster: mgmt-kafka 
  name: {{ . }}
  namespace: kafka-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  config:
    retention.ms: 600000
    cleanup.policy: delete
  partitions: 3
  replicas: 1
  topicName: {{ . }}
{{- end}}
