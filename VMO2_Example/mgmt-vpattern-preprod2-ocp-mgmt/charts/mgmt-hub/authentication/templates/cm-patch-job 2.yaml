---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-ca-ignoreextraneous-patch
  namespace: openshift-authentication
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: auth-ca-ignoreextraneous-patcher
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/sh
            - -ec
            - |
              for i in $(seq 1 30); do
                oc get configmap v4-0-config-user-idp-0-ca -n openshift-authentication && break
                sleep 5
              done

              oc annotate configmap v4-0-config-user-idp-0-ca \
                -n openshift-authentication \
                argocd.argoproj.io/compare-options=IgnoreExtraneous \
                --overwrite
