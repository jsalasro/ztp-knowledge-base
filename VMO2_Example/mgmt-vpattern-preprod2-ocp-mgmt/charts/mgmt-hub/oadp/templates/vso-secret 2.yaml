---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vso-secret
  namespace: open-cluster-management-backup
spec:
  type: kv-v2 
  mount: {{ .Values.mgmt.vault.vault_engine }}
  path: preprod/{{ splitList "-" .Values.mgmt.cluster.name | first }}/oadp/secret
  destination:
    name: fb-s3-credentials
    create: true
  refreshAfter: 30s
  vaultAuthRef: vault-secrets-operator/default