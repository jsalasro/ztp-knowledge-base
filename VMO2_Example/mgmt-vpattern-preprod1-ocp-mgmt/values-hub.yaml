# File name depends clusterGroupName in values-global.yaml

clusterGroup:
  name: hub
  isHubCluster: true

  imperative:
    # Use cluster-admin privilege level for imperative to approve install plans
    # verbosity: "-vvv"
    clusterRoleYaml:
    - apiGroups:
      - '*'
      resources:
      - '*'
      verbs:
      - '*'
    - nonResourceURLs:
      - '*'
      verbs:
      - '*'

  # Add storage labels to OpenShift nodes if needed
  # nodes:
  # - DOMAIN_EXAMPLE_22.COM:
  #     labels:
  #       example: ""
  # - DOMAIN_EXAMPLE_23.COM:
  #     labels:
  #       example: ""
  # - DOMAIN_EXAMPLE_24.COM:
  #     labels:
  #       example: ""
  # - DOMAIN_EXAMPLE_25.COM:
  #     labels:
  #       example: ""

  # Set masters schedulables
  mastersSchedulable: true

  namespaces:
  - prom-kafka-adapter
  - mano-apps
  - ztp
  - ansible-automation-platform:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - talm-operator:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
      targetNamespaces: null
  - metallb-system:
      operatorGroup: true
      targetNamespaces: null
      labels:
        openshift.io/cluster-monitoring: "true"
  - open-cluster-management:
      operatorGroup: true
  - multicluster-engine:
      operatorGroup: true
      labels:
        openshift.io/cluster-monitoring: "true"
  - openshift-nmstate:
      operatorGroup: true
  - openshift-local-storage:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - openshift-storage:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - openshift-cnv:
      operatorGroup: true
  - quay-enterprise:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - kafka-cluster:
      operatorGroup: true
  - openshift-logging:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - openshift-cluster-observability-operator:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
      targetNamespaces: null
  - service-telemetry:
      operatorGroup: true
  - cert-manager-operator:
      operatorGroup: true
  - portworx:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - openshift-update-service:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - openshift-adp:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
  - rhacs-operator:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
      targetNamespaces: null
  - vault-secrets-operator:
      labels:
        openshift.io/cluster-monitoring: "true"
      operatorGroup: true
      targetNamespaces: null
  - open-cluster-management-backup
  - cert-manager

  operatorgroupExcludes:
  - open-cluster-management-backup
  - cert-manager

  subscriptions:
    advanced-cluster-management:
      name: advanced-cluster-management
      namespace: open-cluster-management
      source: cs-redhat-operator-index-v4-18
      channel: release-2.13
      csv: advanced-cluster-management.v2.13.4

    ansible-automation-platform-operator:
      name: ansible-automation-platform-operator
      namespace: ansible-automation-platform 
      source: cs-redhat-operator-index-v4-18
      channel: stable-2.6-cluster-scoped
      csv: aap-operator.v2.6.0-0.1763137355

    multicluster-engine:
      name: multicluster-engine
      namespace: multicluster-engine
      source: cs-redhat-operator-index-v4-18
      channel: stable-2.8
      csv: multicluster-engine.v2.8.3

    openshift-cert-manager-operator:
      name: openshift-cert-manager-operator
      namespace: cert-manager-operator
      source: cs-redhat-operator-index-v4-18
      channel: stable-v1.15
      csv: cert-manager-operator.v1.15.1

    kubernetes-nmstate-operator:
      name: kubernetes-nmstate-operator
      namespace: openshift-nmstate  
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: kubernetes-nmstate-operator.4.18.0-202509101149

    kubevirt-hyperconverged:
      name: kubevirt-hyperconverged
      namespace: openshift-cnv
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: kubevirt-hyperconverged-operator.v4.18.13

    quay-operator:
      name: quay-operator
      namespace: quay-enterprise
      source: cs-redhat-operator-index-v4-18
      channel: stable-3.14
      csv: quay-operator.v3.14.5

    cluster-observability-operator:
      name: cluster-observability-operator
      namespace: openshift-cluster-observability-operator
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: cluster-observability-operator.v1.1.1

    amq-streams:
      name: amq-streams
      namespace: kafka-cluster
      source: cs-redhat-operator-index-v4-18
      channel: amq-streams-2.9.x
      csv: amqstreams.v2.9.2-1

    openshift-logging:
      namespace: openshift-logging
      name: cluster-logging
      source: cs-redhat-operator-index-v4-18
      channnel: stable-6.2
      csv: cluster-logging.v6.2.5

    topology-aware-lifecycle-manager:
      name: topology-aware-lifecycle-manager
      namespace: talm-operator 
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: topology-aware-lifecycle-manager.v4.18.0

    cincinnati-operator:
      name: cincinnati-operator
      namespace: openshift-update-service
      source: cs-redhat-operator-index-v4-18
      channel: v1
      csv: update-service-operator.v5.0.3

    metallb-operator:
      name: metallb-operator
      namespace: metallb-system
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: metallb-operator.v4.18.0-202509100344

    rhacs-operator:
      name: rhacs-operator
      namespace: rhacs-operator
      source: cs-redhat-operator-index-v4-18
      channel: stable
      csv: rhacs-operator.v4.7.6

    ## Even if OADP is deployed through ACM it is necessary to define here the operator to approve the installplan.
    redhat-oadp-operator:
      name: redhat-oadp-operator-subscription
      namespace: open-cluster-management-backup
      source: cs-redhat-operator-index-v4-18
      channel: stable-1.4
      csv: oadp-operator.v1.4.6

    portworx-certified:
      name: portworx-certified
      namespace: portworx
      source: cs-certified-operator-index-v4-18
      channel: stable
      csv: portworx-operator.v25.4.0

    vault-secrets-operator:
      name: vault-secrets-operator
      namespace: vault-secrets-operator
      source: cs-certified-operator-index-v4-18
      channel: stable
      csv: vault-secrets-operator.v1.0.1

  projects:
  - hub

  applications:
    cert-manager:
      name: cert-manager
      path: charts/mgmt-hub/cert-manager
      project: hub

    authentication:
      name: authentication
      namespace: openshift-config
      path: charts/mgmt-hub/authentication
      project: hub

    vault:
      name: vault
      path: charts/mgmt-hub/vault
      project: hub

    ansible:
      name: ansible
      path: charts/mgmt-hub/ansible
      project: hub

    nmstate:
      name: nmstate
      namespace: openshift-nmstate
      path: charts/mgmt-hub/nmstate 
      project: hub

    mcp-update:
      name: mcp-update
      namespace: imperative
      path: charts/mgmt-hub/mcp-update 
      project: hub

    nmstate-config:
      name: nmstate-config
      namespace: openshift-nmstate
      path: charts/mgmt-hub/nmstate-config 
      project: hub

    cnv:
      name: kubevirt-hyperconverged
      namespace: openshift-cnv
      path: charts/mgmt-hub/cnv  
      project: hub

    logging:
      name: logging
      namespace: openshift-logging
      path: charts/mgmt-hub/logging
      project: hub

    vms:
      name: vms
      namespace: mgmt-apps 
      project: hub
      path: charts/mgmt-hub/vm-on-bm

    quay:
      name: quay
      path: charts/mgmt-hub/quay
      project: hub

    perf-profile:
      name: perf-profile
      project: hub
      path: charts/mgmt-hub/perf-profile

    acm:
      name: acm
      namespace: open-cluster-management
      project: hub
      path: charts/mgmt-hub/acm
      ignoreDifferences:
      - group: internal.open-cluster-management.io
        kind: ManagedClusterInfo
        jsonPointers:
        - /spec/loggingCA

    kafka:
      name: kafka
      namespace: kafka-cluster
      path: charts/mgmt-hub/kafka
      project: hub

    monitoring:
      name: monitoring
      namespace: prom-kafka-adapter
      path: charts/mgmt-hub/monitoring
      project: hub
 
    gitops:
      name: gitops
      path: charts/mgmt-hub/gitops
      project: hub

    ztp:
      name: ztp
      namespace: multicluster-engine
      path: charts/mgmt-hub/ztp
      project: hub

    metallb:
      name: metallb
      namespace: metallb-system
      path: charts/mgmt-hub/metallb
      project: hub

    portworx:
      name: portworx
      namespace: portworx
      path: charts/mgmt-hub/portworx
      project: hub

    oadp:
      name: oadp
      namespace: open-cluster-management-backup
      path: charts/mgmt-hub/oadp
      project: hub

  # Required if managed clusters are disconnected and are going to perform an OCP upgrade
    osus:
      name: osus
      namespace: openshift-update-service
      path: charts/mgmt-hub/osus
      project: hub

# Variables for Charts/Playbooks
  # Go to README.md to get expected variables and examples

mgmt:
  cluster:
    name: preprod1-ocp-mgmt
    location: slough
    domain: DOMAIN_EXAMPLE_5.COM
    mgmt_location: slough
    # enableUnsealVault: false

  authentication:
    ldap:
      crt: 
      url: DOMAIN_EXAMPLE_6.COM
      bind_dn: TCsvcPP1-rhoc-ldap@DOMAIN_EXAMPLE_7.COM
      groups_base_dn: OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com
      users_base_dn: DC=uk,DC=pri,DC=o2,DC=com
      group_membership: '%28%7C%28memberOf%3DCN%3Dg-telco-mds13-admin%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CCDC%3Do2%2CDC%3Dcom%29%28memberOf%3DCN%3Dg-TelcoCloud-CoreInfra-Admins%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CDC%3Do2%2CDC%3Dcom%29%28memberOf%3DCN%3Dg-TelcoCloud-Support-Infra%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CDC%3Do2%2CDC%3Dcom%29%28memberOf%3DCN%3Dg-telco-redhat-supplier%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CDC%3Do2%2CDC%3Dcom%29%28memberOf%3DCN%3Dg-telcocloud-ICEDAuto%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CDC%3Do2%2CDC%3Dcom%29%28memberOf%3DCN%3Dg-telco-wwt-supplier%2COU%3DGlobal+Secure+Groups%2COU%3DSecure+Groups%2CDC%3Duk%2CDC%3Dpri%2CDC%3Do2%2CDC%3Dcom%29%29'
