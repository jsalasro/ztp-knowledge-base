      - "CN=g-telco-mdsl3-admin,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      - "CN=g-TelcoCloud-CoreInfra-Admins,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      - "CN=g-TelcoCloud-Support-Infra,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      - "CN=g-telco-redhat-supplier,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      - "CN=g-telcocloud-ICEDAuto,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      - "CN=g-telco-wwt-supplier,OU=Global Secure Groups,OU=Secure Groups,DC=uk,DC=pri,DC=o2,DC=com"
      sync_schedule: "*/15 * * * *"

  vault:
