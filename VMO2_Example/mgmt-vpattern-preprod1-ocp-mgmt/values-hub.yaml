    vaultMount: approle
    vault_engine: ocp
    vaultURL: https://DOMAIN_EXAMPLE_8.COM:8200
    vault_roleID: 143a2b77-dbb1-8c2d-c192-27a74d5019a4
    image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9@sha256:da9d6d4ed8b2b86ca7ef6cd0eeaa996c1e2fe7427f0d31baf7a576248940295d

