# Policy generator for workload cluster operators installation
---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: cwl-generator-operators-install
policyDefaults:
  namespace: policies-cwl
  categories:
    - "CM Configuration Management"
  complianceType: musthave
  controls:
    - "CM-2 Baseline Configuration"
  description: "Manages operator installation on specific version"
  disabled: false
  remediationAction: enforce
  severity: high
  evaluationInterval:
    compliant: 60m
    noncompliant: 10s
  # Put each object in its own ConfigurationPolicy in the Policy
  consolidateManifests: false
  policySets:
    - cwl-install-operator-policies
policySetDefaults:
  placement:
    placementName: cwl-placement
placementBindingDefaults:
  name: cwl-install-operator-binding
policies:
  # install compliance operator
  - name: cwl-operator-install-compliance
    disabled: false
    manifests:
      - path: operators_install/base_manifests/compliance/01_ns.yaml
      - path: operators_install/base_manifests/compliance/02_operatorgroup.yaml
      - path: operators_install/base_manifests/compliance/03_approve_ip.yaml
      - path: operators_install/base_manifests/operatorGenericSubscription.yaml
        patches:
          - metadata:
              name: compliance-operator-subs
              namespace: openshift-compliance
            spec:
              channel: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "compliance-channel" hub}}'
              name: compliance-operator
              startingCSV: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "compliance-startingCSV" hub}}'
      - path: operators_install/base_manifests/operatorGenericSubscriptionCheck.yaml
        remediationAction: inform
        patches:
          - metadata:
              name: compliance-operator-subs
              namespace: openshift-compliance
            status:
              installedCSV: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "compliance-startingCSV" hub}}'
      - path: operators_install/base_manifests/csvGenericStatus.yaml
        remediationAction: inform
        patches:
          - metadata:
              name: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "compliance-startingCSV" hub}}'
              namespace: openshift-compliance
  # install odf operator
  - name: cwl-operator-install-odf
    disabled: false
    manifests:
      - path: operators_install/base_manifests/odf/01_ns.yaml
      - path: operators_install/base_manifests/odf/02_operatorgroup.yaml
      - path: operators_install/base_manifests/odf/03_approve_ip.yaml
      - path: operators_install/base_manifests/operatorGenericSubscription.yaml
        patches:
          - metadata:
              name: odf-operator-subs
              namespace: openshift-storage
            spec:
              channel: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "odf-channel" hub}}'
              name: odf-operator
              startingCSV: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "odf-startingCSV" hub}}'
      - path: operators_install/base_manifests/operatorGenericSubscriptionCheck.yaml
        remediationAction: inform
        patches:
          - metadata:
              name: odf-operator-subs
              namespace: openshift-storage
            status:
              installedCSV: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "odf-startingCSV" hub}}'
      - path: operators_install/base_manifests/csvGenericStatus.yaml
