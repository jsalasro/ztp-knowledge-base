        patches:
          - metadata:
              name: '{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "odf-startingCSV" hub}}'
              namespace: openshift-storage
      - path: operators_install/base_manifests/odf/04_enable_console.yaml
