---
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: cwl-operator-install-approve-metallb
spec:
  pruneObjectBehavior: None
  remediationAction: enforce
  severity: high
  object-templates-raw: |
    {{- $operatorCSV := "{{hub fromConfigMap "policies-cwl" "operators-version-cwl-v0" "metallb-startingCSV" hub}}" }}
    {{- range $installplan := (lookup "operators.coreos.com/v1alpha1" "InstallPlan" "metallb-system" "").items }}
      {{- range $installplan.spec.clusterServiceVersionNames }}
      {{- if eq . $operatorCSV }}
      - complianceType: musthave
        objectDefinition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: InstallPlan
          metadata:
            namespace: '{{ $installplan.metadata.namespace }}'
            name: '{{ $installplan.metadata.name }}'
          spec:
            approved: true
      {{- end }}
      {{- end }}
    {{- end }}
...