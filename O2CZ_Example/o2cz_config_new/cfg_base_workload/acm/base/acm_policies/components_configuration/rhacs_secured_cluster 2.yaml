---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/description: Create RHACS Secured cluster in CWL
  name: rhacs-secured-cluster-managed
  namespace: policies-cwl
spec:
  disabled: false
  policy-templates:
  # secured cluster namespace
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: stackrox-namespace
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: stackrox
    # Apply init bundle secrets
    - extraDependencies:
        - name: stackrox-namespace
          namespace: ""
          apiVersion: policy.open-cluster-management.io/v1
          compliance: Compliant
          kind: ConfigurationPolicy
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: create-central-connection-secrets
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  labels:
                    certificate_key_name: sensor-cert.pem
                  name: sensor-tls
                  namespace: stackrox
                data: '{{hub copySecretData "policies-cwl" "sensor-tls" hub}}'
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  labels:
                    certificate_key_name: collector-cert.pem
                  name: collector-tls
                  namespace: stackrox
                data: '{{hub copySecretData "policies-cwl" "collector-tls" hub}}'
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  labels:
                    certificate_key_name: admission-control-cert.pem
                  name: admission-control-tls
                  namespace: stackrox
                data: '{{hub copySecretData "policies-cwl" "admission-control-tls" hub}}'
    # Create Role for privileged collector
    - extraDependencies:
        - name: stackrox-namespace
          namespace: ""
          apiVersion: policy.open-cluster-management.io/v1
          compliance: Compliant
          kind: ConfigurationPolicy
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: secured-cluster-privileged-role
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  annotations:
                    email: support@stackrox.com
                    meta.helm.sh/release-name: stackrox-secured-cluster-services
                    meta.helm.sh/release-namespace: stackrox
                    owner: stackrox
                  labels:
                    app.kubernetes.io/component: collector
                    app.kubernetes.io/instance: stackrox-secured-cluster-services
                    app.kubernetes.io/managed-by: Helm
                    app.kubernetes.io/name: stackrox
                    app.kubernetes.io/part-of: stackrox-secured-cluster-services
                    app.kubernetes.io/version: 4.4.1
                    auto-upgrade.stackrox.io/component: sensor
                    helm.sh/chart: stackrox-secured-cluster-services-400.4.1
                  name: use-privileged-scc
                  namespace: stackrox
                rules:
                - apiGroups:
                  - security.openshift.io
                  resourceNames:
                  - privileged
                  resources:
                  - securitycontextconstraints
                  verbs:
                  - use
    # Create privileged rolebinding for collector
    - extraDependencies:
        - name: secured-cluster-privileged-role
          namespace: ""
          apiVersion: policy.open-cluster-management.io/v1
          compliance: Compliant
          kind: ConfigurationPolicy
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: secured-cluster-privileged-rolebinding
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  annotations:
                    email: support@stackrox.com
                    meta.helm.sh/release-name: stackrox-secured-cluster-services
                    meta.helm.sh/release-namespace: stackrox
                    owner: stackrox
                  labels:
                    app.kubernetes.io/component: collector
                    app.kubernetes.io/instance: stackrox-secured-cluster-services
                    app.kubernetes.io/managed-by: Helm
                    app.kubernetes.io/name: stackrox
                    app.kubernetes.io/part-of: stackrox-secured-cluster-services
                    app.kubernetes.io/version: 4.4.1
                    auto-upgrade.stackrox.io/component: sensor
                    helm.sh/chart: stackrox-secured-cluster-services-400.4.1
                  name: collector-use-scc
                  namespace: stackrox
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: use-privileged-scc
                subjects:
                - kind: ServiceAccount
                  name: collector
                  namespace: stackrox
    # secured instance
    - extraDependencies:
        - name: create-central-connection-secrets
          namespace: ""
          apiVersion: policy.open-cluster-management.io/v1
          compliance: Compliant
          kind: ConfigurationPolicy
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: secured-cluster-instance-create
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: platform.stackrox.io/v1alpha1
                kind: SecuredCluster
                metadata:
                  name: stackrox-secured-cluster-services
                  namespace: stackrox
                spec:
                  clusterName: '{{ (lookup "config.openshift.io/v1" "DNS" "" "cluster").spec.baseDomain }}'
                  centralEndpoint: '{{hub (lookup "v1" "Secret" "policies-cwl" "sensor-tls").metadata.labels.centralEndpoint hub}}:443'
                  ### Patch for ROX-23463
                  ### https://access.redhat.com/solutions/7062920
                  overlays:
                  - apiVersion: apps/v1
                    kind: DaemonSet
                    name: collector
                    patches:
                    - path: spec.template.spec.containers[name:collector].env[-1]
                      value: |
                        name: ROX_COLLECTOR_SINSP_CPU_PER_BUFFER
                        value: "4"
                    - path: spec.template.spec.containers[name:collector].env[-1]
                      value: |
                        name: ROX_COLLECTOR_SINSP_THREAD_CACHE_SIZE
                        value: "8192"
                    - path: spec.template.spec.containers[name:collector].env[-1]
                      value: |
                        name: ROX_COLLECTOR_SINSP_BUFFER_SIZE
                        value: "1048576"
                  ### End patch for ROX-23463
                  monitoring:
                    openshift:
                      enabled: true
                  auditLogs:
                    collection: Auto
                  admissionControl:
                    listenOnUpdates: true
                    bypass: BreakGlassAnnotation
                    contactImageScanners: DoNotScanInline
                    listenOnCreates: true
                    replicas: 3
                    timeoutSeconds: 20
                    listenOnEvents: true
                  scannerV4:
                    db:
                      persistence:
                        persistentVolumeClaim:
                          claimName: scanner-v4-db
                    indexer:
                      scaling:
                        autoScaling: Enabled
                        maxReplicas: 5
                        minReplicas: 2
                        replicas: 3
                    scannerComponent: Default
                  scanner:
                    analyzer:
                      scaling:
                        autoScaling: Enabled
                        maxReplicas: 5
                        minReplicas: 2
                        replicas: 3
                    scannerComponent: AutoSense
                  perNode:
                    collector:
                      collection: CORE_BPF
                      forceCollection: false
                      imageFlavor: Regular
                    taintToleration: TolerateTaints
    # Check secured cluster deployment
    - extraDependencies:
        - name: secured-cluster-instance-create
          namespace: ""
          apiVersion: policy.open-cluster-management.io/v1
          compliance: Compliant
          kind: ConfigurationPolicy
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: secured-cluster-instance-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: platform.stackrox.io/v1alpha1
                kind: SecuredCluster
                metadata:
                  name: stackrox-secured-cluster-services
                  namespace: stackrox
                status:
                  conditions:
                  - type: Deployed
                    status: "True"
...
