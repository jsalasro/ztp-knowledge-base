---
apiVersion: tuned.openshift.io/v1
kind: Tuned
metadata:
  name: perf-sysctl-gateway
  namespace: openshift-cluster-node-tuning-operator
spec:
  profile:
  - name: perf-sysctl-gateway
    data: |
      [main]
      summary=Custom tuned profile for OpenShift Gateway nodes to configure HTP and sysctl parameters
      include=openshift-node-performance-perf-profile-gateway

      [vm]
      transparent_hugepages=madvise

      [sysctl]
      net.ipv4.tcp_slow_start_after_idle=0
      net.netfilter.nf_conntrack_tcp_timeout_unacknowledged=10
      net.netfilter.nf_conntrack_tcp_timeout_max_retrans=10
      fs.inotify.max_user_watches=1048576
      net.core.netdev_max_backlog=30000
      net.core.rmem_default=8388608
      net.core.wmem_default=8388608
      net.core.rmem_max=66708864
      net.core.wmem_max=66708864
      vm.max_map_count=262144
      net.ipv4.tcp_wmem= "4096 16384 8388608"
      net.ipv4.tcp_rmem= "4096 87380 8388608"
      net.ipv4.udp_mem="3145728 4194304 8388608"
      net.sctp.sack_timeout=40
      net.sctp.rcvbuf_policy=1
      net.sctp.sctp_mem= "8388608 8388608 8388608"
      net.sctp.sctp_rmem= "8388608 8388608 8388608"
      net.sctp.sctp_wmem= "8388608 8388608 8388608"
      net.sctp.sndbuf_policy=1
      net.sctp.auth_enable=1
      net.ipv4.conf.all.rp_filter=0
      net.ipv4.ip_nonlocal_bind=1
      net.ipv6.ip_nonlocal_bind=1
      kernel.sched_rt_runtime_us=950000
      net.ipv4.conf.all.send_redirects=0
      net.ipv4.conf.default.send_redirects=0
      net.ipv4.conf.all.accept_redirects=0
      net.ipv4.conf.default.accept_redirects=0
      net.ipv4.conf.all.secure_redirects=0
      net.ipv4.conf.default.secure_redirects=0
      net.ipv4.icmp_ignore_bogus_error_responses=0
      net.ipv4.icmp_echo_ignore_broadcasts=0
      net.ipv4.conf.all.log_martians=1
      net.ipv4.conf.default.log_martians=1
      net.ipv4.conf.all.forwarding=1
      net.ipv4.udp_l3mdev_accept=1
      net.ipv4.tcp_l3mdev_accept=1
      net.ipv4.tcp_max_syn_backlog=1
      net.unix.max_dgram_qlen=1
  recommend:
  - machineConfigLabels:
      machineconfiguration.openshift.io/role: gateway
    priority: 18
    profile: perf-sysctl-gateway
    operand:
      tunedConfig:
        reapply_sysctl: false
...