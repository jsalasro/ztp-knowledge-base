---
apiVersion: performance.openshift.io/v2
kind: PerformanceProfile
metadata:
  name: perf-profile-worker25g
  annotations:
    kubeletconfig.experimental: '{ "allowedUnsafeSysctls": [ "fs.mqueue.msg_default", "fs.mqueue.msgsize_default", "fs.mqueue.queues_max", "fs.mqueue.msg_max", "fs.mqueue.msgsize_max", "kernel.shmall", "kernel.shmmax", "net.core.somaxconn", "net.unix.max_dgram_qlen", "net.netfilter.nf_conntrack_tcp_timeout_max_retrans", "net.ipv6.conf.all.disable_ipv6", "net.ipv6.conf.default.accept_dad", "net.ipv6.conf.default.dad_transmits", "net.ipv6.conf.all.dad_transmits", "net.ipv6.conf.default.ndisc_notify", "net.ipv6.conf.all.ndisc_notify", "net.ipv6.conf.all.forwarding", "net.ipv6.conf.default.autoconf", "net.ipv6.conf.all.autoconf", "net.ipv6.conf.default.accept_ra", "net.ipv6.conf.all.accept_ra", "net.ipv6.conf.all.accept_dad", "net.ipv6.ip_nonlocal_bind", "net.ipv4.conf.default.arp_notify", "net.ipv4.conf.all.arp_notify", "net.ipv4.tcp_wmem", "net.ipv4.tcp_rmem", "net.ipv4.tcp_mem", "net.ipv4.udp_mem", "net.ipv4.udp_l3mdev_accept", "net.ipv4.conf.all.accept_redirects", "net.ipv4.conf.default.accept_redirects", "net.ipv4.conf.all.rp_filter", "net.ipv4.conf.default.rp_filter", "net.ipv4.tcp_max_syn_backlog", "net.ipv4.ip_local_port_range", "net.ipv4.conf.all.forwarding", "net.ipv4.conf.all.arp_announce", "net.ipv4.tcp_l3mdev_accept", "net.ipv4.ip_nonlocalbind", "net.sctp.auth_enable", "net.sctp.rcvbuf_policy", "net.sctp.sack_timeout", "net.sctp.sctp_mem", "net.sctp.sndbuf_policy" ], "systemReserved": { "memory": "38Gi", "cpu": "10000m" }, "cpuManagerPolicy": "static", "cpuManagerPolicyOptions": { "full-pcpus-only": "false" } }'
spec:
  cpu:
    # First Cores of each NUMA socket and 8vCPU reserved (4+4 per NUMA) for host purposes and 2vCPUs in NUMA-0 for K8 purposes
    isolated: 3-31,34-63,67-95,98-127
    reserved: 0,1,2,32,33,64,65,66,96,97
  globallyDisableIrqLoadBalancing: false
  hugepages:
    defaultHugepagesSize: 1G
    pages:
      - count: 24
        size: 1G
      - count: 14000
        size: 2M
  machineConfigPoolSelector:
    pools.operator.machineconfiguration.openshift.io/appworker25g: ""
  nodeSelector:
    node-role.kubernetes.io/appworker25g: ""
  workloadHints:
    realTime: false
    highPowerConsumption: false
    perPodPowerManagement: true
  realTimeKernel:
    enabled: false
  numa:
    topologyPolicy: "single-numa-node"
  net:
    userLevelNetworking: false
...