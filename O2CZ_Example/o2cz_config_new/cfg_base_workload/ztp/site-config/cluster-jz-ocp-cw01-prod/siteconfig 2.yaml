        rootDeviceHints:
          vendor: HPE
        nodeNetwork:
          interfaces:
            # machineNet + storage (bond0)
            - name: ens15f0np0
              macAddress: b8:3f:d2:6c:6b:62
            - name: ens15f1np1
              macAddress: b8:3f:d2:6c:6b:63
            # OVN + SRIOV (bond1)
            - name: ens1f0np0
              macAddress: 88:e9:a4:d2:19:4e
            - name: ens1f1np0
              macAddress: 88:e9:a4:d2:19:4f
            # OVN + SRIOV (bond1)
            - name: ens3f0np0
              macAddress: 88:e9:a4:d2:19:4a
            - name: ens3f1np0
              macAddress: 88:e9:a4:d2:19:4b
          config:
            interfaces:
              - name: bond0
                type: bond
                state: up
                mtu: 9000
                link-aggregation:
                  mode: 802.3ad
                  port:
                    - ens15f0np0
                    - ens15f1np1
                ipv4:
                  enabled: true
                  dhcp: false
                  address:
                  - ip: IP_ADDRESS_308
                    prefix-length: 24
                ipv6:
                  enabled: true
                  dhcp: false
                  autoconf: false
                  address:
                    - ip: 2001:41d8:2:501::51
                      prefix-length: 64
              - name: bond1
                type: bond
                state: up
                mtu: 9000
                link-aggregation:
                  mode: active-backup
                  port:
                    - ens1f0np0
                    - ens1f1np0
              - name: bond2
                type: bond
                state: up
                mtu: 9000
                link-aggregation:
                  mode: active-backup
                  port:
                    - ens3f0np0
                    - ens3f1np0
            dns-resolver:
              config:
                search:
                  - cz.o2
                  - DOMAIN_EXAMPLE_94.COM
                server:
                  - IP_ADDRESS_224
                  - IP_ADDRESS_225
            routes:
              config:
                - destination: 0.0.0.0/0
                  next-hop-address: IP_ADDRESS_226
                  next-hop-interface: bond0
                  table-id: 254
                - destination: ::/0
                  next-hop-address: 2001:41d8:2:501::1
                  next-hop-interface: bond0
                  table-id: 254
