---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/description: Deploy multicluster hub instance
  name: acm-mch
  namespace: policies
spec:
  disabled: false
  dependencies:
  # ACM operator installed
  - apiVersion: policy.open-cluster-management.io/v1
    compliance: Compliant
    kind: Policy
    name: operator-install-acm
    namespace: policies-mano
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: mch-instance-create
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: operator.open-cluster-management.io/v1
                kind: MultiClusterHub
                metadata:
                  name: multiclusterhub
                  namespace: open-cluster-management
                spec: 
                  availabilityConfig: High
                  enableClusterBackup: false
                  ingress: {}
                  overrides:
                    components:
                      - enabled: false
                        name: submariner-addon
                      - enabled: false
                        name: volsync
                      - enabled: false
                        name: multicluster-observability
                      - enabled: true
                        name: cluster-backup
                      - enabled: true
                        name: app-lifecycle
                      - enabled: true
                        name: cluster-lifecycle
                      - enabled: true
                        name: cluster-permission
                      - enabled: true
                        name: console
                      - enabled: true
                        name: grc
                      - enabled: true
                        name: insights
                      - enabled: true
                        name: multicluster-engine
                      - enabled: true
                        name: search
                  separateCertificateManagement: false
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: mch-instance-check
        spec:
          pruneObjectBehavior: None
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.open-cluster-management.io/v1
                kind: MultiClusterHub
                metadata:
                  name: multiclusterhub
                  namespace: open-cluster-management
                status:
                  conditions:
                  - type: Complete
                    status: "True"
...