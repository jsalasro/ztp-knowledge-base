---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/description: Apply ZTP recommended settings
  name: ztp-setup-base-settings
  namespace: policies
spec:
  disabled: false
  policy-templates:
    # disable multiclusterengine cluster-proxy-addon
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ztp-disable-cluster-proxy
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: multicluster.openshift.io/v1
                kind: MultiClusterEngine
                metadata:
                  name: multiclusterengine
                spec:
                  availabilityConfig: High
                  overrides:
                    components:
                      - enabled: true
                        name: local-cluster
                      - enabled: true
                        name: assisted-service
                      - enabled: true
                        name: cluster-lifecycle
                      - enabled: true
                        name: cluster-manager
                      - enabled: true
                        name: discovery
                      - enabled: true
                        name: hive
                      - enabled: true
                        name: server-foundation
                      - enabled: false
                        name: cluster-proxy-addon
                      - enabled: true
                        name: hypershift-local-hosting
                      - enabled: true
                        name: hypershift
                      - enabled: true
                        name: managedserviceaccount
                      - enabled: false
                        name: image-based-install-operator-preview
                      - enabled: true
                        name: console-mce
                  targetNamespace: multicluster-engine
                  tolerations:
                    - effect: NoSchedule
                      key: node-role.kubernetes.io/infra
                      operator: Exists
    # watch all namespaces
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ztp-watch-all-namespaces
        spec:
          pruneObjectBehavior: None
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: metal3.io/v1alpha1
                kind: Provisioning
                metadata:
                  name: provisioning-configuration
                spec:
                  watchAllNamespaces: true
...